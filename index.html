<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>تهنئة نادي نظم المعلومات الإدارية</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@700&family=Kufam:wght@700&display=swap" rel="stylesheet">
    
    <style>
        :root {
            /* لون الرمادي النيلي Gray Indigo */
            --indigo-gray: #4a5a73; 
            --page-bg: #f8fafc;
        }

        body {
            font-family: 'Cairo', sans-serif;
            text-align: center;
            background-color: var(--page-bg);
            padding: 20px;
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        .container {
            max-width: 450px;
            width: 100%;
            background: white;
            padding: 25px;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(74, 90, 115, 0.1);
        }

        h2 { color: var(--indigo-gray); margin-bottom: 10px; }

        input {
            width: 100%;
            padding: 14px;
            margin: 15px 0;
            border: 2px solid #e2e8f0;
            border-radius: 12px;
            box-sizing: border-box;
            font-size: 18px;
            text-align: center;
        }

        button {
            width: 100%;
            padding: 14px;
            background-color: var(--indigo-gray);
            color: white;
            border: none;
            border-radius: 12px;
            font-size: 18px;
            cursor: pointer;
            font-weight: bold;
            transition: 0.3s;
        }

        button:hover { opacity: 0.9; transform: translateY(-2px); }

        #canvasContainer { margin-top: 25px; display: none; }

        canvas {
            width: 100%;
            border-radius: 15px;
            border: 1px solid #ddd;
        }

        .download-btn { background-color: #334155; margin-top: 15px; }
    </style>
</head>
<body>

<div class="container">
    <h2>بطاقة نادي MIS 🌙</h2>
    <p>اكتبي الاسم لتجهيز التهنئة</p>
    
    <input type="text" id="userInput" placeholder="اكتبي الاسم الكريم هنا..." maxlength="25">
    <button onclick="generateImage()">عرض البطاقة</button>

    <div id="canvasContainer">
        <canvas id="mainCanvas"></canvas>
        <button class="download-btn" onclick="downloadImage()">حفظ الصورة</button>
    </div>
</div>

<script>
    function generateImage() {
        const canvas = document.getElementById('mainCanvas');
        const ctx = canvas.getContext('2d');
        const name = document.getElementById('userInput').value || "عضو نادي MIS";
        const img = new Image();

        // تأكدي أن اسم الصورة في المجلد هو misclub.jpg تماماً كما أرفقتِها
        img.src = 'misclub.jpg'; 
        
        img.onload = function() {
            canvas.width = img.width;
            canvas.height = img.height;
            ctx.drawImage(img, 0, 0);

            // إعدادات الخط (Gray Indigo)
            ctx.font = "bold 45px 'Kufam'"; 
            ctx.fillStyle = "#FFFFFF"; 
            ctx.textAlign = "center";

            // تحديد مكان النص بناءً على أبعاد صورتك الأخيرة (تقريباً عند 910)
            ctx.fillText(name, canvas.width / 2, 800); 

            document.getElementById('canvasContainer').style.display = "block";
        };

        img.onerror = function() {
            alert("لم يتم العثور على صورة 'misclub.jpg'. تأكدي من وجودها بجانب ملف الـ HTML.");
        };
    }

    function downloadImage() {
        const canvas = document.getElementById('mainCanvas');
        const link = document.createElement('a');
        link.download = 'MIS-Club-Card.png';
        link.href = canvas.toDataURL();
        link.click();
    }
</script>

</body>
</html>
